<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>
      ぽかぽか陽気の穏やかな朝
      花畑では、蝶々がのんびり飛んでいます
  </title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
      background-color: #f5f5f5;
    }

    .wrapper {
      max-width: 960px;
      margin: 40px auto;
      padding: 16px;
      background: #ffffff;
      box-shadow: 0 4px 16px rgba(0,0,0,0.1);
      border-radius: 12px;
    }

    .image-area {
      position: relative;
      overflow: hidden;
      border-radius: 12px;
    }

    /* 背景（花畑） */
    .bg-img {
      width: 100%;
      display: block;
    }

    /* 蝶の画像（画像の位置を再現） */
    .butterfly {
      position: absolute;
      width: 70px;
    }

    /* 画像の構図に合わせた位置 */
    .b1 { top: 18%; left: 12%; }
    .b2 { top: 28%; left: 22%; }
    .b3 { top: 35%; left: 30%; }
    .b4 { top: 42%; left: 18%; }

  </style>
</head>
<body>
  <div class="wrapper">
    <div class="image-area">

      <!-- 背景写真 -->
      <img src="background.jpg" class="bg-img" alt="背景">

      <!-- 蝶の写真（画像の位置を再現） -->
      <img src="butterfly.gif" class="butterfly b1" alt="蝶">
      <img src="butterfly.gif" class="butterfly b2" alt="蝶">
      <img src="butterfly.gif" class="butterfly b3" alt="蝶">
      <img src="butterfly.gif" class="butterfly b4" alt="蝶">

    </div>
  </div>
</body>
</html>
